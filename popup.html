<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>TabBuddy</title>

    <link
        rel="stylesheet"
        href="popup.css"
    >
</head>

<body>

<div class="app">

    <!-- ============================= -->
    <!-- HEADER -->
    <!-- ============================= -->

    <header class="header">

        <div class="brand">
            <span class="brand-icon">
                ▣
            </span>

            <span class="brand-name">
                TabBuddy
            </span>
        </div>

        <button
            id="saveTabs"
            class="save-button"
            title="Aktuelle Tabs speichern"
        >
            Save Tabs
        </button>

    </header>


    <!-- ============================= -->
    <!-- CONTENT -->
    <!-- ============================= -->

    <main class="content">


        <!-- ============================= -->
        <!-- SEARCH -->
        <!-- Nur bei All Tabs + Starred -->
        <!-- ============================= -->

        <div
            id="searchRow"
            class="search-row hidden"
        >

            <div class="search-box">

                <span class="search-icon">
                    ⌕
                </span>

                <input
                    id="search"
                    type="text"
                    placeholder="Search your tabs..."
                >

            </div>

        </div>


        <!-- STATUS -->

        <div
            id="status"
            class="status"
        ></div>


        <!-- ============================= -->
        <!-- HOME -->
        <!-- ============================= -->

        <section
            id="homeView"
            class="view active"
        >

            <!-- CATEGORIES -->

            <div class="section-header">

                <h2>
                    Categories
                </h2>

                <button
                    class="see-all"
                    data-view-target="all"
                >
                    See all
                </button>

            </div>

            <div
                id="categoryGrid"
                class="category-grid"
            ></div>


            <!-- RECENT TABS -->

            <div class="section-header">

                <h2>
                    Recent Tabs
                </h2>

                <button
                    class="see-all"
                    data-view-target="all"
                >
                    See all
                </button>

            </div>

            <div
                id="recentTabs"
                class="tab-list"
            ></div>


            <!-- IMPORTANT TABS -->

            <div class="section-header">

                <h2>
                    Important Tabs
                </h2>

                <button
                    class="see-all"
                    data-view-target="starred"
                >
                    See all
                </button>

            </div>

            <div
                id="importantTabs"
                class="tab-list"
            ></div>

        </section>


        <!-- ============================= -->
        <!-- ALL TABS -->
        <!-- ============================= -->

        <section
            id="allView"
            class="view"
        >

            <div class="section-header">

                <h2>
                    All Tabs
                </h2>

                <span
                    id="allCount"
                    class="count"
                ></span>

            </div>

            <div
                id="allTabs"
                class="tab-list"
            ></div>

        </section>


        <!-- ============================= -->
        <!-- STARRED -->
        <!-- ============================= -->

        <section
            id="starredView"
            class="view"
        >

            <div class="section-header">

                <h2>
                    Starred
                </h2>

                <span
                    id="starredCount"
                    class="count"
                ></span>

            </div>

            <div
                id="starredTabs"
                class="tab-list"
            ></div>

        </section>


        <!-- ============================= -->
        <!-- SETTINGS -->
        <!-- ============================= -->

        <section
            id="settingsView"
            class="view"
        >

            <div class="settings-card">

                <h2>
                    Settings
                </h2>

                <p>
                    Tabs werden nur gespeichert,
                    wenn du manuell auf
                    „Save Tabs“ klickst.
                </p>


                <!-- RETENTION SETTINGS -->

                <div class="setting-group">

                    <label
                        for="retentionDays"
                        class="setting-label"
                    >
                        Delete saved tabs after
                    </label>

                    <div class="retention-input-row">

                        <input
                            id="retentionDays"
                            class="retention-input"
                            type="number"
                            min="1"
                            step="1"
                            value="3"
                        >

                        <span class="retention-unit">
                            days
                        </span>

                    </div>

                    <p class="setting-description">
                        Saved tabs are automatically
                        removed after this period.
                    </p>

                    <button
                        id="saveRetentionSettings"
                        class="secondary-button"
                    >
                        Save settings
                    </button>

                    <div
                        id="settingsStatus"
                        class="settings-status"
                    ></div>

                </div>


                <button
                    id="saveTabsSettings"
                    class="primary-button"
                >
                    Save current tabs
                </button>

            </div>

        </section>

    </main>


    <!-- ============================= -->
    <!-- BOTTOM NAVIGATION -->
    <!-- ============================= -->

    <nav class="bottom-navigation">

        <button
            class="nav-item active"
            data-view="home"
        >

            <span class="nav-icon">
                ⌂
            </span>

            <span>
                Home
            </span>

        </button>


        <button
            class="nav-item"
            data-view="all"
        >

            <span class="nav-icon">
                ☷
            </span>

            <span>
                All Tabs
            </span>

        </button>


        <button
            class="nav-item"
            data-view="starred"
        >

            <span class="nav-icon">
                ☆
            </span>

            <span>
                Starred
            </span>

        </button>


        <button
            class="nav-item"
            data-view="settings"
        >

            <span class="nav-icon">
                ⚙
            </span>

            <span>
                Settings
            </span>

        </button>

    </nav>

</div>

<script src="popup.js"></script>

</body>
</html>
